# Example secrets file. TEMPLATE ONLY, not encrypted, safe to commit.
#
# This shows the shape a real secrets file takes. To create an encrypted one:
#   sops secrets/prod.yaml
# sops opens your editor; you type plaintext keys and values, and sops writes an
# encrypted file. The encrypted versions are gitignored (secrets/*.yaml), this
# example is the one exception (see .gitignore).
#
# Reference a secret in NixOS like this:
#   sops.secrets."ollama_api_token" = {
#     sopsFile = ./secrets/prod.yaml;
#     path = "/var/lib/hearth/secrets/ollama_api_token";
#     mode = "0400";
#     owner = "hearth";
#   };

ollama_api_token: replace-me-with-a-real-value
example_agent_api_key: replace-me-with-a-real-value
