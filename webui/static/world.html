<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>hearth facility</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #05080f; overflow: hidden;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    color: #cfe6ff;
  }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; }
  /* CRT scanline + vignette overlay */
  #crt {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
    );
  }
  #crt-vignette {
    position: fixed; inset: 0; z-index: 6; pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,4,0.55) 100%);
  }
  /* subtle flicker driven by JS class toggle */
  #crt.flicker { opacity: 0.93; }
  /* CRT toggle */
  #crtToggle {
    position: fixed; bottom: 60px; right: 12px; z-index: 20;
    background: rgba(8,14,24,0.7); border: 1px solid #16324f;
    color: #5a7fa0; font-size: 9px; font-family: inherit;
    padding: 3px 7px; border-radius: 5px; cursor: pointer;
    letter-spacing: .05em;
  }
  #crtToggle:hover { color: #5fd0ff; border-color: #5fd0ff; }
  /* HUD top bar */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    background: rgba(5,8,15,0.85); border-bottom: 1px solid #16324f;
    backdrop-filter: blur(6px);
    display: flex; align-items: center; gap: 16px;
    padding: 6px 16px; height: 44px; box-sizing: border-box;
  }
  #hud .logo {
    color: #5fd0ff; font-size: 13px; text-transform: uppercase;
    letter-spacing: .1em; white-space: nowrap; display: flex; align-items: center; gap: 6px;
  }
  .flame { display: inline-block; font-size: 16px; animation: flicker 1.4s ease-in-out infinite alternate; }
  @keyframes flicker { 0% { opacity: .7; transform: scaleY(.95); } 100% { opacity: 1; transform: scaleY(1.06); } }
  .hbar { display: flex; flex-direction: column; gap: 2px; min-width: 100px; }
  .hbar-label { font-size: 9px; color: #5fd0ff; opacity: .7; text-transform: uppercase; letter-spacing: .06em; }
  .hbar-track { height: 5px; background: #0e2236; border-radius: 3px; overflow: hidden; }
  .hbar-fill { height: 100%; background: linear-gradient(90deg, #1c6, #5fd0ff); border-radius: 3px;
    transition: width .6s ease; }
  .hbar-fill.warn { background: linear-gradient(90deg, #f0a030, #ff6030); }
  .hbar-text { font-size: 9px; color: #8a93a0; }
  #agentCount {
    margin-left: auto; font-size: 11px; color: #5fd0ff;
    background: rgba(95,208,255,0.08); border: 1px solid #16324f;
    padding: 2px 10px; border-radius: 10px;
  }
  #navLink {
    font-size: 10px; color: #8a93a0; text-decoration: none;
    border: 1px solid #16324f; padding: 2px 8px; border-radius: 6px;
  }
  #navLink:hover { color: #5fd0ff; border-color: #5fd0ff; }
  /* Launch bar bottom */
  #launcher {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: rgba(5,8,15,0.88); border-top: 1px solid #16324f;
    backdrop-filter: blur(6px);
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; height: 52px; box-sizing: border-box;
  }
  #launcher input {
    flex: 1; background: #0e2236; border: 1px solid #16324f; color: #cfe6ff;
    padding: 6px 10px; border-radius: 6px; font-family: inherit; font-size: 12px;
    outline: none;
  }
  #launcher input:focus { border-color: #5fd0ff; }
  #launcher input::placeholder { color: #3a5a7a; }
  .btn {
    background: #16324f; color: #cfe6ff; border: 1px solid #1e4a6e;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 11px;
    font-family: inherit; white-space: nowrap; transition: background .15s;
  }
  .btn:hover { background: #1e4a6e; }
  .btn.primary { background: #5fd0ff; color: #04150c; border-color: #5fd0ff; }
  .btn.primary:hover { background: #80dcff; }
  #toast {
    position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
    background: #0e3a20; border: 1px solid #1c6; color: #6fcf7f;
    padding: 6px 20px; border-radius: 20px; font-size: 12px;
    z-index: 20; opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
  /* Popover (hover) */
  #popover {
    position: fixed; z-index: 30;
    background: rgba(8,14,24,0.96); border: 1px solid #16324f;
    border-radius: 10px; padding: 12px 16px; min-width: 200px; max-width: 280px;
    font-size: 11px; line-height: 1.6;
    display: none; pointer-events: none;
  }
  #popover .pop-title { color: #5fd0ff; font-size: 12px; margin-bottom: 6px; }
  #popover .pop-row { display: flex; justify-content: space-between; gap: 8px; }
  #popover .pop-label { color: #5a7fa0; }
  #popover .pop-val { color: #cfe6ff; text-align: right; max-width: 160px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Inspect panel (click) */
  #inspect {
    position: fixed; right: 0; top: 44px; bottom: 52px; z-index: 25;
    width: 320px; background: rgba(5,8,15,0.96); border-left: 1px solid #16324f;
    display: none; flex-direction: column; overflow: hidden;
  }
  #inspect.open { display: flex; }
  #inspect-header {
    padding: 10px 14px 8px; border-bottom: 1px solid #16324f;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  #inspect-title { color: #5fd0ff; font-size: 12px; font-weight: bold; }
  #inspect-close {
    cursor: pointer; color: #5a7fa0; font-size: 14px; line-height: 1;
    background: none; border: none; padding: 0; font-family: inherit;
  }
  #inspect-close:hover { color: #5fd0ff; }
  #inspect-meta { padding: 6px 14px; font-size: 10px; color: #5a7fa0; border-bottom: 1px solid #0e2236; flex-shrink: 0; }
  #inspect-body {
    flex: 1; overflow-y: auto; padding: 8px 14px;
    font-size: 11px; line-height: 1.55;
  }
  .ev-msg { margin: 6px 0; }
  .ev-msg .ev-who { color: #6fcf7f; font-size: 10px; }
  .ev-msg .ev-text { color: #cfe6ff; white-space: pre-wrap; word-break: break-word; }
  .ev-tool { margin: 6px 0; background: rgba(14,34,54,0.6); border-left: 2px solid #5fd0ff;
    padding: 4px 8px; border-radius: 0 4px 4px 0; }
  .ev-tool .ev-tname { color: #5fd0ff; font-size: 10px; }
  .ev-tool .ev-tout { color: #9fb6cc; font-size: 10px; white-space: pre-wrap; word-break: break-word; }
  .ev-spawn { color: #8a93a0; font-size: 10px; font-style: italic; margin: 4px 0; }
  #inspect-loading { padding: 20px 14px; color: #5a7fa0; font-size: 11px; }
  #inspect-empty { padding: 20px 14px; color: #5a7fa0; font-size: 11px; }
  /* growth ledger panel (left) */
  #growth {
    position: fixed; left: 0; top: 44px; bottom: 52px; z-index: 25;
    width: 340px; background: rgba(5,8,15,0.96); border-right: 1px solid #16324f;
    display: none; flex-direction: column; overflow: hidden;
  }
  #growth.open { display: flex; }
  #growth-header {
    padding: 10px 14px 8px; border-bottom: 1px solid #16324f;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  #growth-title { color: #ffb347; font-size: 12px; font-weight: bold; }
  #growth-close { cursor: pointer; color: #5a7fa0; font-size: 14px; line-height: 1;
    background: none; border: none; padding: 0; font-family: inherit; }
  #growth-close:hover { color: #ffb347; }
  #growth-status {
    padding: 8px 14px; font-size: 10px; color: #9fb6cc; border-bottom: 1px solid #0e2236;
    flex-shrink: 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  #growth-status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  #growth-status .on { background: #6fcf7f; box-shadow: 0 0 6px #6fcf7f; }
  #growth-status .off { background: #e06a6a; }
  #growth-toggle {
    margin-left: auto; cursor: pointer; font-family: inherit; font-size: 10px;
    border: 1px solid #16324f; background: rgba(255,179,71,0.1); color: #ffb347;
    padding: 3px 9px; border-radius: 6px;
  }
  #growth-toggle:hover { border-color: #ffb347; }
  #growth-body { flex: 1; overflow-y: auto; padding: 8px 14px; font-size: 11px; line-height: 1.5; }
  .grow-item { margin: 7px 0; padding: 5px 8px; border-radius: 0 4px 4px 0; background: rgba(14,34,54,0.5); }
  .grow-item.success { border-left: 2px solid #6fcf7f; }
  .grow-item.failure { border-left: 2px solid #e06a6a; }
  .grow-item.lesson  { border-left: 2px solid #5fd0ff; }
  .grow-item .gi-kind { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: #8a93a0; }
  .grow-item .gi-text { color: #cfe6ff; white-space: pre-wrap; word-break: break-word; }
  #growth-branches { padding: 8px 14px; border-top: 1px solid #0e2236; font-size: 10px; color: #6fcf7f; flex-shrink: 0; max-height: 110px; overflow-y: auto; }
  #growth-branches .gb-title { color: #8a93a0; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  #promote { padding: 8px 14px; border-top: 1px solid #16324f; flex-shrink: 0; }
  #promote .pr-title { color: #8a93a0; text-transform: uppercase; letter-spacing: .06em; font-size: 9px; margin-bottom: 6px; }
  .pr-btns { display: flex; gap: 5px; flex-wrap: wrap; }
  .pr-b { cursor: pointer; font-family: inherit; font-size: 10px; border: 1px solid #16324f;
    background: rgba(95,208,255,0.08); color: #5fd0ff; padding: 3px 8px; border-radius: 6px; }
  .pr-b:hover { border-color: #5fd0ff; }
  .pr-b.danger { background: rgba(224,106,106,0.1); color: #e06a6a; border-color: #5a2a2a; }
  .pr-b.danger:hover { border-color: #e06a6a; }
  #pr-status { font-size: 10px; color: #9fb6cc; margin-top: 6px; white-space: pre-wrap; }
  #pr-history { margin-top: 6px; font-size: 10px; }
  #pr-history .ph { color: #7f93a8; }
  #pr-history .ph.ok { color: #6fcf7f; }
  #pr-history .ph.bad { color: #e06a6a; }
  #pr-diff-out { margin-top: 6px; max-height: 220px; overflow: auto; background: #070d17;
    border: 1px solid #0e2236; border-radius: 6px; padding: 6px; font-size: 10px;
    color: #9fb6cc; white-space: pre; }
</style>
</head><body>
<canvas id="c"></canvas>
<!-- CRT effect layers -->
<div id="crt"></div>
<div id="crt-vignette"></div>
<button id="crtToggle" title="toggle scanlines">CRT</button>
<!-- HUD top -->
<div id="hud">
  <div class="logo"><span class="flame">&#x1F525;</span> hearth facility</div>
  <div class="hbar" id="gpuBar" style="display:none">
    <div class="hbar-label">GPU</div>
    <div class="hbar-track"><div class="hbar-fill" id="gpuFill" style="width:0%"></div></div>
    <div class="hbar-text" id="gpuText">--</div>
  </div>
  <div class="hbar" id="vramBar" style="display:none">
    <div class="hbar-label">VRAM</div>
    <div class="hbar-track"><div class="hbar-fill" id="vramFill" style="width:0%"></div></div>
    <div class="hbar-text" id="vramText">--</div>
  </div>
  <div class="hbar" id="ramBar" style="display:none">
    <div class="hbar-label">RAM</div>
    <div class="hbar-track"><div class="hbar-fill" id="ramFill" style="width:0%"></div></div>
    <div class="hbar-text" id="ramText">--</div>
  </div>
  <div id="agentCount">0 agents</div>
  <a id="navLink" href="/command">command</a>
</div>
<!-- launch bar bottom -->
<div id="launcher">
  <input id="goalInput" placeholder="give the facility a goal..." />
  <button class="btn primary" id="btnMission">launch mission</button>
  <button class="btn" id="btnRun">run agent</button>
  <button class="btn" id="btnGrow" title="hearth improves itself on a loop; each idea is branched + validated, never auto-deployed">grow hearth</button>
  <button class="btn" id="btnLedger" title="watch what hearth has built for itself">ledger</button>
</div>
<div id="toast">dispatched</div>
<div id="popover">
  <div class="pop-title" id="popTitle">agent</div>
  <div class="pop-row"><span class="pop-label">id</span><span class="pop-val" id="popId">--</span></div>
  <div class="pop-row"><span class="pop-label">kind</span><span class="pop-val" id="popKind">--</span></div>
  <div class="pop-row"><span class="pop-label">state</span><span class="pop-val" id="popState">--</span></div>
  <div class="pop-row"><span class="pop-label">detail</span><span class="pop-val" id="popDetail">--</span></div>
  <div class="pop-row"><span class="pop-label">goal</span><span class="pop-val" id="popGoal">--</span></div>
  <div style="margin-top:6px;font-size:9px;color:#3a5a7a">click to inspect</div>
</div>
<!-- growth ledger panel (left) -->
<div id="growth">
  <div id="growth-header">
    <span id="growth-title">growth ledger</span>
    <button id="growth-close">x</button>
  </div>
  <div id="growth-status">
    <span class="dot off" id="growth-dot"></span>
    <span id="growth-daemon">daemon: --</span>
    <span id="growth-count" style="color:#6fcf7f"></span>
    <span id="growth-merged" style="color:#ffb347"></span>
    <button id="growth-toggle">start</button>
  </div>
  <div id="growth-body"><div style="color:#5a7fa0;padding:14px 0">loading...</div></div>
  <div id="growth-branches"></div>
  <div id="promote">
    <div class="pr-title">promote to live system</div>
    <div class="pr-btns">
      <button id="pr-diff" class="pr-b">review diff</button>
      <button id="pr-build" class="pr-b">build-check</button>
      <button id="pr-switch" class="pr-b danger">apply to live</button>
      <button id="pr-rollback" class="pr-b">rollback</button>
    </div>
    <div id="pr-status">idle</div>
    <div id="pr-history"></div>
    <pre id="pr-diff-out" style="display:none"></pre>
  </div>
</div>
<!-- inspect panel (click-to-open) -->
<div id="inspect">
  <div id="inspect-header">
    <span id="inspect-title">agent</span>
    <button id="inspect-close">x</button>
  </div>
  <div id="inspect-meta"></div>
  <div id="inspect-body">
    <div id="inspect-loading" style="display:none">loading transcript...</div>
    <div id="inspect-empty" style="display:none">no transcript yet</div>
  </div>
</div>
<script>
// ---- constants ----
const PALETTE = {
  bg:      '#05080f',
  floor:   '#070d17',
  grid:    '#0e2236',
  wall:    '#0a1a2c',
  cyan:    '#5fd0ff',
  green:   '#6fcf7f',
  amber:   '#f0a030',
  red:     '#e06a6a',
  text:    '#cfe6ff',
  dim:     '#3a5a7a',
  panel:   '#0e2236',
};

const STATE_COLOR = {
  SPAWNING:         '#5fd0ff',
  IDLE:             '#3a7a5a',
  THINKING:         '#5fd0ff',
  TOOL_CALL:        '#9fe0ff',
  WAITING_IO:       '#7080a0',
  WAITING_APPROVAL: '#f0a030',
  ERRORED:          '#e06a6a',
  DONE:             '#6fcf7f',
};

const STATE_LABEL = {
  SPAWNING:         'spawning',
  IDLE:             'idle',
  THINKING:         'thinking',
  TOOL_CALL:        'working',
  WAITING_IO:       'waiting',
  WAITING_APPROVAL: 'approval',
  ERRORED:          'error',
  DONE:             'done',
};

// ---- canvas setup ----
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, WORLD_W = 0, WORLD_H = 0;
const MARGIN_TOP = 48, MARGIN_BOT = 56;

// track whether inspect panel is open so we shrink world width
let inspectOpen = false;
const INSPECT_W = 320;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  WORLD_W = W;
  WORLD_H = H - MARGIN_TOP - MARGIN_BOT;
}
window.addEventListener('resize', resize);
resize();

// ---- CRT effect ----
let crtEnabled = true;
const crtEl = document.getElementById('crt');
const crtVig = document.getElementById('crt-vignette');
let flickerFrame = 0;

function updateCrt() {
  if (!crtEnabled) return;
  flickerFrame++;
  // flicker every ~4-8 seconds at random (very subtle)
  if (flickerFrame % 240 === 0 && Math.random() < 0.3) {
    crtEl.classList.add('flicker');
    setTimeout(() => crtEl.classList.remove('flicker'), 80 + Math.random() * 80);
  }
}

document.getElementById('crtToggle').addEventListener('click', () => {
  crtEnabled = !crtEnabled;
  crtEl.style.display = crtEnabled ? '' : 'none';
  crtVig.style.display = crtEnabled ? '' : 'none';
  document.getElementById('crtToggle').style.color = crtEnabled ? '#5a7fa0' : '#3a5060';
});

// ---- particle system (ambient dust) ----
const NUM_DUST = 60;
const dust = [];
function initDust() {
  dust.length = 0;
  for (let i = 0; i < NUM_DUST; i++) {
    dust.push({
      x: Math.random() * W,
      y: MARGIN_TOP + Math.random() * WORLD_H,
      vx: (Math.random() - 0.5) * 0.15,
      vy: -0.1 - Math.random() * 0.2,
      r: 0.5 + Math.random() * 1.2,
      alpha: 0.1 + Math.random() * 0.3,
    });
  }
}
initDust();

function updateDust() {
  for (const p of dust) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.y < MARGIN_TOP - 10) {
      p.y = MARGIN_TOP + WORLD_H + 5;
      p.x = Math.random() * W;
    }
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
  }
}

function drawDust() {
  for (const p of dust) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = PALETTE.cyan;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---- floor / world drawing ----
const TILE = 40;
function drawWorld() {
  // solid floor
  ctx.fillStyle = PALETTE.floor;
  ctx.fillRect(0, MARGIN_TOP, W, WORLD_H);

  // tile grid
  ctx.strokeStyle = PALETTE.grid;
  ctx.lineWidth = 0.5;
  ctx.globalAlpha = 0.5;
  for (let x = 0; x < W; x += TILE) {
    ctx.beginPath(); ctx.moveTo(x, MARGIN_TOP); ctx.lineTo(x, MARGIN_TOP + WORLD_H); ctx.stroke();
  }
  for (let y = MARGIN_TOP; y < MARGIN_TOP + WORLD_H; y += TILE) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // wall border
  ctx.strokeStyle = '#16324f';
  ctx.lineWidth = 3;
  ctx.strokeRect(4, MARGIN_TOP + 4, W - 8, WORLD_H - 8);

  // corner tick marks (game-style corners)
  const corners = [[4,MARGIN_TOP+4],[W-4,MARGIN_TOP+4],[4,MARGIN_TOP+WORLD_H-4],[W-4,MARGIN_TOP+WORLD_H-4]];
  ctx.strokeStyle = PALETTE.cyan;
  ctx.lineWidth = 2;
  for (const [cx, cy] of corners) {
    const dx = cx < W/2 ? 12 : -12;
    const dy = cy < H/2 ? 12 : -12;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + dx, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + dy); ctx.stroke();
  }

  // entrance marker (bottom center)
  const ex = W / 2, ey = MARGIN_TOP + WORLD_H - 4;
  ctx.fillStyle = PALETTE.cyan;
  ctx.globalAlpha = 0.18;
  ctx.fillRect(ex - 28, ey - 14, 56, 14);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = PALETTE.cyan;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(ex - 28, ey - 14, 56, 14);
  ctx.fillStyle = PALETTE.cyan;
  ctx.font = '8px ui-monospace, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ENTRANCE', ex, ey - 7);

  // title plate
  drawTitlePlate();

  // vignette (canvas-drawn)
  const vg = ctx.createRadialGradient(W/2, MARGIN_TOP + WORLD_H/2, WORLD_H*0.25, W/2, MARGIN_TOP + WORLD_H/2, WORLD_H*0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,8,0.45)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, MARGIN_TOP, W, WORLD_H);
}

function drawTitlePlate() {
  const px = 24, py = MARGIN_TOP + 18;
  ctx.font = 'bold 11px ui-monospace, monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = PALETTE.cyan;
  ctx.globalAlpha = 0.6;
  ctx.fillText('hearth facility', px, py);
  ctx.globalAlpha = 1;
}

// ---- sprite system ----
const sprites = new Map(); // agent_id -> Sprite
const treeNodes = new Map(); // agent_id -> {parent_id, kind, goal}

class Sprite {
  constructor(id, state, kind) {
    this.id = id;
    this.state = state || 'IDLE';
    this.kind = kind || 'specialist';
    this.detail = '';
    this.goal = '';

    // spawn from entrance
    this.x = W / 2 + (Math.random() - 0.5) * 80;
    this.y = MARGIN_TOP + WORLD_H - 20;
    this.tx = this.x;
    this.ty = this.y;

    this.age = 0;
    this.bobPhase = Math.random() * Math.PI * 2;
    this.walkPhase = 0;
    this.particles = [];
    this.fadeOut = false;
    this.alpha = 0;
    this.done = false;
    this.doneTimer = 0;
    this.celebTimer = 0;
    this.errorFlash = 0;
    this.approvalPulse = 0;
    this.thoughtDots = 0;
    this.thoughtTimer = 0;
    this.sparkles = [];
    this.announced = false;
  }

  setTarget(tx, ty) {
    this.tx = tx;
    this.ty = ty;
  }

  update(dt) {
    this.age++;
    if (this.alpha < 1) this.alpha = Math.min(1, this.alpha + 0.04);

    const dx = this.tx - this.x;
    const dy = this.ty - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 0.5) {
      const speed = Math.min(dist, 2.5);
      this.x += (dx / dist) * speed;
      this.y += (dy / dist) * speed;
      this.walkPhase += 0.25;
    }

    this.bobPhase += 0.04;

    if (this.state === 'THINKING') {
      this.thoughtTimer++;
      if (this.thoughtTimer > 18) { this.thoughtTimer = 0; this.thoughtDots = (this.thoughtDots + 1) % 4; }
    }

    if (this.state === 'TOOL_CALL') {
      if (Math.random() < 0.25) {
        const r = this.isManager() ? 14 : 10;
        this.particles.push({
          x: this.x + (Math.random()-0.5)*r, y: this.y,
          vx: (Math.random()-0.5)*2, vy: -1 - Math.random()*2,
          life: 1, decay: 0.06 + Math.random()*0.04,
          color: Math.random() < 0.5 ? PALETTE.cyan : '#fff',
        });
      }
    }

    if (this.state === 'WAITING_APPROVAL') this.approvalPulse += 0.08;
    if (this.state === 'ERRORED') this.errorFlash += 0.12;

    if (this.state === 'DONE') {
      if (!this.fadeOut) {
        this.celebTimer++;
        if (this.celebTimer < 60) {
          if (this.celebTimer % 4 === 0) {
            const angle = Math.random() * Math.PI * 2;
            this.sparkles.push({
              x: this.x, y: this.y,
              vx: Math.cos(angle) * (1.5 + Math.random() * 2),
              vy: Math.sin(angle) * (1.5 + Math.random() * 2),
              life: 1, r: 2 + Math.random() * 2,
              color: Math.random() < 0.5 ? PALETTE.green : '#a0ffc0',
            });
          }
        } else {
          this.fadeOut = true;
          this.setTarget(W / 2 + (Math.random()-0.5)*60, MARGIN_TOP + WORLD_H - 20);
        }
      } else {
        this.doneTimer++;
        if (this.doneTimer > 80) this.done = true;
        this.alpha = Math.max(0, this.alpha - 0.018);
      }
    }

    // cap particles for performance
    this.particles = this.particles.slice(-40).filter(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.life -= p.decay;
      return p.life > 0;
    });
    this.sparkles = this.sparkles.slice(-30).filter(s => {
      s.x += s.vx; s.y += s.vy; s.vy += 0.05; s.life -= 0.035;
      return s.life > 0;
    });
  }

  isManager() {
    return this.kind === 'manager';
  }

  isGrowth() {
    return this.kind === 'growth';
  }

  draw() {
    if (this.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;

    const mgr = this.isManager();
    const grow = this.isGrowth();
    const R = mgr ? 14 : (grow ? 12 : 9);
    const headR = mgr ? 7 : (grow ? 6 : 5);

    const bobAmt = (this.state === 'IDLE' || this.state === 'THINKING' || this.state === 'WAITING_IO') ? 2 : 0;
    const bob = Math.sin(this.bobPhase) * bobAmt;

    const moving = Math.abs(this.tx - this.x) > 2 || Math.abs(this.ty - this.y) > 2;
    const legSwing = moving ? Math.sin(this.walkPhase) * 3 : 0;

    const bx = this.x, by = this.y + bob;

    // --- draw legs ---
    ctx.strokeStyle = STATE_COLOR[this.state] || PALETTE.cyan;
    ctx.lineWidth = mgr ? 3 : 2;
    ctx.globalAlpha = this.alpha * 0.7;
    if (moving) {
      ctx.beginPath(); ctx.moveTo(bx, by + R); ctx.lineTo(bx - legSwing - 2, by + R + 6 + (mgr?3:0)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx, by + R); ctx.lineTo(bx + legSwing + 2, by + R + 6 + (mgr?3:0)); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(bx, by + R); ctx.lineTo(bx - 3, by + R + 5 + (mgr?2:0)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx, by + R); ctx.lineTo(bx + 3, by + R + 5 + (mgr?2:0)); ctx.stroke();
    }
    ctx.globalAlpha = this.alpha;

    // --- body ---
    const bodyCol = STATE_COLOR[this.state] || PALETTE.cyan;
    const outline = mgr ? '#fff' : (grow ? PALETTE.amber : bodyCol);
    ctx.fillStyle = PALETTE.panel;
    ctx.strokeStyle = outline;
    ctx.lineWidth = mgr ? 2.5 : 1.5;
    roundRect(ctx, bx - R, by - R, R*2, R*2, mgr ? 6 : 4);
    ctx.fill();
    ctx.stroke();

    if (mgr) {
      ctx.fillStyle = bodyCol;
      ctx.globalAlpha = this.alpha * 0.1;
      roundRect(ctx, bx - R + 2, by - R + 2, R*2 - 4, R*2 - 4, 4);
      ctx.fill();
      ctx.globalAlpha = this.alpha;
    }

    // arms
    ctx.strokeStyle = outline;
    ctx.lineWidth = mgr ? 2.5 : 1.5;
    const armWave = this.state === 'TOOL_CALL' ? Math.sin(this.age * 0.3) * 4 : 0;
    ctx.beginPath(); ctx.moveTo(bx - R, by); ctx.lineTo(bx - R - (mgr?5:3), by - armWave); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx + R, by); ctx.lineTo(bx + R + (mgr?5:3), by + armWave); ctx.stroke();

    // --- head ---
    const headY = by - R - headR - 2;
    ctx.fillStyle = PALETTE.panel;
    ctx.strokeStyle = outline;
    ctx.lineWidth = mgr ? 2.5 : 1.5;
    ctx.beginPath(); ctx.arc(bx, headY, headR, 0, Math.PI*2); ctx.fill(); ctx.stroke();

    // eyes
    ctx.fillStyle = bodyCol;
    ctx.beginPath(); ctx.arc(bx - headR*0.35, headY - headR*0.1, mgr ? 1.8 : 1.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx + headR*0.35, headY - headR*0.1, mgr ? 1.8 : 1.2, 0, Math.PI*2); ctx.fill();

    // manager antenna
    if (mgr) {
      ctx.strokeStyle = PALETTE.cyan;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(bx, headY - headR); ctx.lineTo(bx - 4, headY - headR - 8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx, headY - headR); ctx.lineTo(bx + 4, headY - headR - 8); ctx.stroke();
      ctx.fillStyle = PALETTE.cyan;
      ctx.beginPath(); ctx.arc(bx - 4, headY - headR - 8, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 4, headY - headR - 8, 2, 0, Math.PI*2); ctx.fill();
    }

    // growth daemon: a spinning gear above the head = "tinkering on hearth itself"
    if (grow) {
      const gx = bx, gy = headY - headR - 9, gr = 5;
      const spin = this.age * (this.state === 'TOOL_CALL' ? 0.14 : 0.04);
      ctx.strokeStyle = PALETTE.amber;
      ctx.fillStyle = PALETTE.amber;
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 8; i++) {
        const a = spin + i * Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(gx + Math.cos(a) * gr, gy + Math.sin(a) * gr);
        ctx.lineTo(gx + Math.cos(a) * (gr + 2.5), gy + Math.sin(a) * (gr + 2.5));
        ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(gx, gy, gr, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(gx, gy, 1.6, 0, Math.PI*2); ctx.fill();
    }

    // --- state overlays ---
    const bubbleY = headY - headR - (mgr ? 6 : 4);

    if (this.state === 'THINKING') {
      this.drawThoughtBubble(bx, bubbleY);
    } else if (this.state === 'WAITING_IO') {
      this.drawSpinner(bx, bubbleY - 4);
    } else if (this.state === 'WAITING_APPROVAL') {
      this.drawApprovalBubble(bx, bubbleY);
    } else if (this.state === 'ERRORED') {
      this.drawErrorCloud(bx, bubbleY);
    } else if (this.state === 'TOOL_CALL') {
      this.drawWrench(bx + R + 8, by - 8);
    } else if (this.state === 'DONE' && !this.fadeOut) {
      const t = Math.min(this.celebTimer / 20, 1);
      ctx.strokeStyle = PALETTE.green;
      ctx.lineWidth = 2.5;
      ctx.globalAlpha = this.alpha * t;
      ctx.beginPath();
      ctx.moveTo(bx - 5, bubbleY - 4);
      ctx.lineTo(bx - 1, bubbleY);
      ctx.lineTo(bx + 6, bubbleY - 9);
      ctx.stroke();
      ctx.globalAlpha = this.alpha;
    }

    // --- tool call sparks ---
    for (const p of this.particles) {
      ctx.globalAlpha = this.alpha * p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
    }
    // --- done sparkles ---
    for (const s of this.sparkles) {
      ctx.globalAlpha = this.alpha * s.life;
      ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r * s.life, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = this.alpha;

    // --- label under sprite ---
    const labelY = by + R + (mgr ? 12 : 10);
    const shortId = this.id.length > 14 ? this.id.slice(0, 12) + '..' : this.id;
    const stateWord = STATE_LABEL[this.state] || this.state.toLowerCase();
    ctx.font = `${mgr ? 10 : 9}px ui-monospace, monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    ctx.fillStyle = 'rgba(5,8,15,0.7)';
    const tw = ctx.measureText(shortId).width;
    ctx.fillRect(bx - tw/2 - 3, labelY - 1, tw + 6, 20);

    ctx.fillStyle = PALETTE.text;
    ctx.fillText(shortId, bx, labelY);
    ctx.fillStyle = STATE_COLOR[this.state] || PALETTE.cyan;
    ctx.font = `8px ui-monospace, monospace`;
    ctx.fillText(stateWord, bx, labelY + 11);

    ctx.restore();
  }

  drawThoughtBubble(bx, by) {
    const dots = '.'.repeat(this.thoughtDots) || '.';
    ctx.fillStyle = PALETTE.panel;
    ctx.strokeStyle = PALETTE.cyan;
    ctx.lineWidth = 1;
    ctx.globalAlpha = this.alpha * 0.85;
    ctx.beginPath(); ctx.arc(bx + 4, by + 2, 2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(bx + 8, by - 2, 3, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    roundRect(ctx, bx - 14, by - 20, 28, 14, 5);
    ctx.fill(); ctx.stroke();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = PALETTE.cyan;
    ctx.font = '9px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(dots, bx, by - 13);
  }

  drawSpinner(bx, by) {
    const angle = (this.age * 0.1) % (Math.PI * 2);
    ctx.strokeStyle = PALETTE.dim;
    ctx.lineWidth = 2;
    ctx.globalAlpha = this.alpha * 0.5;
    ctx.beginPath(); ctx.arc(bx, by, 7, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = this.alpha;
    ctx.strokeStyle = PALETTE.cyan;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(bx, by, 7, angle, angle + Math.PI * 1.3); ctx.stroke();
    ctx.fillStyle = PALETTE.cyan;
    ctx.globalAlpha = this.alpha * 0.6;
    ctx.beginPath(); ctx.arc(bx, by - 3, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx, by + 3, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = this.alpha;
  }

  drawApprovalBubble(bx, by) {
    const pulse = Math.sin(this.approvalPulse) * 0.3 + 0.7;
    ctx.globalAlpha = this.alpha * pulse;
    ctx.fillStyle = PALETTE.panel;
    ctx.strokeStyle = PALETTE.amber;
    ctx.lineWidth = 2;
    roundRect(ctx, bx - 9, by - 18, 18, 16, 4);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = PALETTE.amber;
    ctx.font = 'bold 11px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('!', bx, by - 10);
    ctx.globalAlpha = this.alpha;
  }

  drawErrorCloud(bx, by) {
    const flash = Math.abs(Math.sin(this.errorFlash));
    ctx.globalAlpha = this.alpha * (0.5 + flash * 0.5);
    ctx.fillStyle = 'rgba(180,30,30,0.4)';
    ctx.strokeStyle = PALETTE.red;
    ctx.lineWidth = 2;
    roundRect(ctx, bx - 10, by - 18, 20, 16, 4);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = PALETTE.red;
    ctx.font = 'bold 11px ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('!', bx, by - 10);
    ctx.globalAlpha = this.alpha;
  }

  drawWrench(bx, by) {
    const rot = (this.age * 0.12) % (Math.PI * 2);
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(rot);
    ctx.strokeStyle = PALETTE.cyan;
    ctx.lineWidth = 2;
    ctx.globalAlpha = this.alpha * 0.9;
    ctx.beginPath(); ctx.arc(0, -5, 4, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -1); ctx.lineTo(0, 7); ctx.stroke();
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ---- layout engine ----
function layoutSprites() {
  const groups = [];
  const loners = [];

  for (const [id, sp] of sprites) {
    const node = treeNodes.get(id);
    if (!node) { loners.push(sp); continue; }
    if (node.parent_id) continue;
    const children = [...sprites.values()].filter(s => {
      const n = treeNodes.get(s.id);
      return n && n.parent_id === id;
    });
    if (children.length > 0 || (node && node.kind === 'manager')) {
      groups.push({ manager: sp, specialists: children });
    } else {
      loners.push(sp);
    }
  }

  for (const [id, sp] of sprites) {
    const node = treeNodes.get(id);
    if (node && node.parent_id) {
      if (!sprites.has(node.parent_id)) {
        loners.push(sp);
      }
    }
  }

  const totalGroups = groups.length + (loners.length > 0 ? 1 : 0);
  const rightBound = inspectOpen ? W - INSPECT_W - 10 : W - 30;
  const worldLeft = 30;
  const worldRight = rightBound;
  const worldTop = MARGIN_TOP + 30;
  const worldBottom = MARGIN_TOP + WORLD_H - 50;
  const worldW = worldRight - worldLeft;
  const worldHH = worldBottom - worldTop;

  const cols = Math.max(1, Math.ceil(Math.sqrt(totalGroups)));
  const rows = Math.ceil(totalGroups / cols);
  const cellW = worldW / cols;
  const cellH = worldHH / rows;
  let gi = 0;

  for (const grp of groups) {
    const col = gi % cols;
    const row = Math.floor(gi / cols);
    const cx = worldLeft + col * cellW + cellW * 0.5;
    const cy = worldTop + row * cellH + cellH * 0.4;
    grp.manager.setTarget(cx, cy);

    const n = grp.specialists.length;
    const radius = Math.min(cellW, cellH) * 0.28 + n * 4;
    grp.specialists.forEach((sp, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      sp.setTarget(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
    });
    gi++;
  }

  if (loners.length > 0) {
    const col = gi % cols;
    const row = Math.floor(gi / cols);
    const cx = worldLeft + col * cellW + cellW * 0.5;
    const cy = worldTop + row * cellH + cellH * 0.4;
    const n = loners.length;
    loners.forEach((sp, i) => {
      const perRow = Math.ceil(Math.sqrt(n));
      const lrow = Math.floor(i / perRow);
      const lcol = i % perRow;
      const lx = cx - (perRow-1)*20 + lcol * 40;
      const ly = cy - (Math.ceil(n/perRow)-1)*25 + lrow * 50;
      sp.setTarget(lx, ly);
    });
  }
}

// ---- tether lines ----
function drawTethers() {
  for (const [id, sp] of sprites) {
    const node = treeNodes.get(id);
    if (!node || !node.parent_id) continue;
    const parent = sprites.get(node.parent_id);
    if (!parent) continue;
    const alpha = Math.min(sp.alpha, parent.alpha) * 0.3;
    if (alpha <= 0) continue;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = PALETTE.cyan;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(parent.x, parent.y);
    ctx.lineTo(sp.x, sp.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

// ---- room zones + labels ----
function drawRoomZones() {
  const groups = getGroups();
  let lonerBounds = null;
  const lonerSprites = getLonerSprites();

  // draw crew rooms
  for (const grp of groups) {
    if (!grp.manager) continue;
    const all = [grp.manager, ...grp.specialists];
    if (all.length < 2) continue;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const sp of all) {
      minX = Math.min(minX, sp.x); minY = Math.min(minY, sp.y);
      maxX = Math.max(maxX, sp.x); maxY = Math.max(maxY, sp.y);
    }
    const pad = 30;
    minX -= pad; minY -= pad; maxX += pad; maxY += pad;

    ctx.globalAlpha = 0.06;
    ctx.fillStyle = PALETTE.cyan;
    roundRect(ctx, minX, minY, maxX-minX, maxY-minY, 14);
    ctx.fill();
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = PALETTE.cyan;
    ctx.lineWidth = 1;
    roundRect(ctx, minX, minY, maxX-minX, maxY-minY, 14);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // room label above zone
    const node = treeNodes.get(grp.manager.id) || {};
    const rawGoal = node.goal || grp.manager.goal || '';
    const labelText = rawGoal.length > 40 ? rawGoal.slice(0, 38) + '..' : (rawGoal || 'crew ' + grp.manager.id.slice(0, 8));
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.font = '9px ui-monospace, monospace';
    ctx.fillStyle = '#8a93a0';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(labelText, (minX + maxX) / 2, minY + 2);
    ctx.restore();
  }

  // draw loner zone
  if (lonerSprites.length > 0) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const sp of lonerSprites) {
      minX = Math.min(minX, sp.x); minY = Math.min(minY, sp.y);
      maxX = Math.max(maxX, sp.x); maxY = Math.max(maxY, sp.y);
    }
    const pad = 28;
    minX -= pad; minY -= pad; maxX += pad; maxY += pad;
    ctx.globalAlpha = 0.04;
    ctx.fillStyle = '#8a93a0';
    roundRect(ctx, minX, minY, maxX-minX, maxY-minY, 14);
    ctx.fill();
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = '#8a93a0';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,5]);
    roundRect(ctx, minX, minY, maxX-minX, maxY-minY, 14);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    // loner zone label
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.font = '9px ui-monospace, monospace';
    ctx.fillStyle = '#8a93a0';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('free agents', (minX + maxX) / 2, minY + 2);
    ctx.restore();
  }
}

function getGroups() {
  const result = [];
  for (const [id, sp] of sprites) {
    const node = treeNodes.get(id);
    if (node && node.parent_id) continue;
    const children = [...sprites.values()].filter(s => {
      const n = treeNodes.get(s.id);
      return n && n.parent_id === id;
    });
    result.push({ manager: sp, specialists: children });
  }
  return result;
}

function getLonerSprites() {
  const loners = [];
  for (const [id, sp] of sprites) {
    const node = treeNodes.get(id);
    if (!node) { loners.push(sp); continue; }
    if (node.parent_id) {
      if (!sprites.has(node.parent_id)) loners.push(sp);
      continue;
    }
    // root with no children and not manager
    const children = [...sprites.values()].filter(s => {
      const n = treeNodes.get(s.id);
      return n && n.parent_id === id;
    });
    if (children.length === 0 && node.kind !== 'manager') loners.push(sp);
  }
  return loners;
}

// ---- minimap ----
const MM = { x: 0, y: 0, w: 120, h: 80, pad: 6 };
const MINIMAP_THRESHOLD = 12;

function drawMinimap() {
  const total = sprites.size;
  if (total < MINIMAP_THRESHOLD && W >= WORLD_W && H >= (WORLD_H + MARGIN_TOP + MARGIN_BOT)) {
    // skip if not many agents and world fits viewport
    // but still draw if we have >8 for orientation
    if (total < 8) return;
  }

  // position: bottom-left corner (above launcher, inside wall)
  MM.x = 16;
  MM.y = MARGIN_TOP + WORLD_H - MM.h - 16;

  // background
  ctx.save();
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = 'rgba(5,8,15,0.85)';
  roundRect(ctx, MM.x, MM.y, MM.w, MM.h, 6);
  ctx.fill();
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = PALETTE.cyan;
  ctx.lineWidth = 1;
  roundRect(ctx, MM.x, MM.y, MM.w, MM.h, 6);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // label
  ctx.font = '7px ui-monospace, monospace';
  ctx.fillStyle = '#5a7fa0';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('MAP', MM.x + 4, MM.y + 3);

  // dots for each agent
  const worldLeft = 30, worldRight = W - 30;
  const worldTop = MARGIN_TOP + 30;
  const worldBottom = MARGIN_TOP + WORLD_H - 50;
  const innerW = MM.w - MM.pad * 2;
  const innerH = MM.h - MM.pad * 2 - 10;

  for (const [id, sp] of sprites) {
    if (sp.alpha <= 0) continue;
    const nx = (sp.x - worldLeft) / (worldRight - worldLeft);
    const ny = (sp.y - worldTop) / (worldBottom - worldTop);
    const dotX = MM.x + MM.pad + nx * innerW;
    const dotY = MM.y + MM.pad + 10 + ny * innerH;
    const r = sp.isManager() ? 3 : 2;
    ctx.globalAlpha = sp.alpha * 0.9;
    ctx.fillStyle = STATE_COLOR[sp.state] || PALETTE.cyan;
    ctx.beginPath(); ctx.arc(dotX, dotY, r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ---- inspect panel ----
let inspectedId = null;

function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(s || '')));
  return d.innerHTML;
}

function safeText(node, value) {
  node.textContent = String(value || '');
}

function openInspect(sp) {
  inspectedId = sp.id;
  inspectOpen = true;
  const panel = document.getElementById('inspect');
  panel.classList.add('open');
  document.getElementById('inspect-title').textContent = sp.id;
  const node = treeNodes.get(sp.id) || {};
  const meta = document.getElementById('inspect-meta');
  meta.textContent = (node.kind || sp.kind || 'agent') + ' | ' + (sp.state || '').toLowerCase() + (node.goal ? ' | ' + node.goal.slice(0, 40) : '');

  const body = document.getElementById('inspect-body');
  const loadEl = document.getElementById('inspect-loading');
  const emptyEl = document.getElementById('inspect-empty');
  body.innerHTML = '';
  body.appendChild(loadEl);
  body.appendChild(emptyEl);
  loadEl.style.display = '';
  emptyEl.style.display = 'none';

  fetch('/transcript?agent=' + encodeURIComponent(sp.id))
    .then(r => r.json())
    .then(j => {
      loadEl.style.display = 'none';
      const events = (j.transcript || []).slice(-30);
      if (events.length === 0) {
        emptyEl.style.display = '';
        return;
      }
      for (const ev of events) {
        const d = ev.event || {};
        const el = document.createElement('div');
        if (d.type === 'message') {
          el.className = 'ev-msg';
          const who = document.createElement('div');
          who.className = 'ev-who';
          who.textContent = 'agent says:';
          const txt = document.createElement('div');
          txt.className = 'ev-text';
          txt.textContent = (d.content || '').slice(0, 400);
          el.appendChild(who);
          el.appendChild(txt);
        } else if (d.type === 'tool_result') {
          el.className = 'ev-tool';
          const tn = document.createElement('div');
          tn.className = 'ev-tname';
          tn.textContent = 'tool: ' + (d.tool || '');
          const tout = document.createElement('div');
          tout.className = 'ev-tout';
          tout.textContent = (d.output || '').slice(0, 300);
          el.appendChild(tn);
          el.appendChild(tout);
        } else if (d.type === 'spawn') {
          el.className = 'ev-spawn';
          el.textContent = 'spawned: ' + (d.child_id || d.agent_id || '');
        } else if (d.type === 'done') {
          el.className = 'ev-spawn';
          el.textContent = 'done' + (d.summary ? ': ' + (d.summary || '').slice(0, 80) : '');
        } else {
          el.className = 'ev-spawn';
          el.textContent = (d.type || 'event') + (d.detail ? ': ' + (d.detail || '').slice(0, 80) : '');
        }
        body.insertBefore(el, loadEl);
      }
    })
    .catch(err => {
      loadEl.style.display = 'none';
      emptyEl.style.display = '';
      emptyEl.textContent = 'transcript unavailable';
    });

  layoutSprites();
}

function closeInspect() {
  inspectedId = null;
  inspectOpen = false;
  document.getElementById('inspect').classList.remove('open');
  layoutSprites();
}

document.getElementById('inspect-close').addEventListener('click', closeInspect);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && inspectOpen) closeInspect();
});

// ---- popover (hover) ----
let popoverTarget = null;
canvas.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  let found = null;
  for (const [id, sp] of sprites) {
    const R = sp.isManager() ? 14 : 9;
    const dx = mx - sp.x, dy = my - sp.y;
    if (Math.sqrt(dx*dx+dy*dy) < R + 8) { found = sp; break; }
  }
  const pop = document.getElementById('popover');
  if (found) {
    popoverTarget = found;
    const node = treeNodes.get(found.id) || {};
    document.getElementById('popTitle').textContent = found.id;
    document.getElementById('popId').textContent = found.id;
    document.getElementById('popKind').textContent = node.kind || found.kind || 'agent';
    document.getElementById('popState').textContent = (found.state || '').toLowerCase();
    document.getElementById('popDetail').textContent = found.detail || '--';
    document.getElementById('popGoal').textContent = node.goal || '--';
    let px = mx + 16, py = my - 40;
    if (px + 290 > W) px = mx - 296;
    if (py < 50) py = my + 10;
    pop.style.left = px + 'px';
    pop.style.top = py + 'px';
    pop.style.display = 'block';
    canvas.style.cursor = 'pointer';
  } else {
    pop.style.display = 'none';
    popoverTarget = null;
    canvas.style.cursor = '';
  }
});

canvas.addEventListener('click', e => {
  const mx = e.clientX, my = e.clientY;
  for (const [id, sp] of sprites) {
    const R = sp.isManager() ? 14 : 9;
    const dx = mx - sp.x, dy = my - sp.y;
    if (Math.sqrt(dx*dx+dy*dy) < R + 10) {
      document.getElementById('popover').style.display = 'none';
      openInspect(sp);
      return;
    }
  }
  // click on empty canvas closes inspect
  if (inspectOpen) closeInspect();
});

// ---- data layer ----
let models = [];

async function fetchModels() {
  try {
    const j = await (await fetch('/models')).json();
    models = j.models || [];
  } catch(e) {}
}

async function fetchStats() {
  try {
    const j = await (await fetch('/stats')).json();
    const g = j.gpu, m = j.mem;
    if (g) {
      document.getElementById('gpuBar').style.display = '';
      document.getElementById('vramBar').style.display = '';
      const up = g.util_pct;
      document.getElementById('gpuFill').style.width = up + '%';
      document.getElementById('gpuFill').className = 'hbar-fill' + (up > 85 ? ' warn' : '');
      document.getElementById('gpuText').textContent = g.name + ' ' + up + '%';
      const vp = Math.round(100 * g.mem_used_mb / g.mem_total_mb);
      document.getElementById('vramFill').style.width = vp + '%';
      document.getElementById('vramFill').className = 'hbar-fill' + (vp > 85 ? ' warn' : '');
      document.getElementById('vramText').textContent = g.mem_used_mb + '/' + g.mem_total_mb + ' MB';
    }
    if (m) {
      document.getElementById('ramBar').style.display = '';
      const rp = Math.round(100 * m.used_mb / m.total_mb);
      document.getElementById('ramFill').style.width = rp + '%';
      document.getElementById('ramFill').className = 'hbar-fill' + (rp > 85 ? ' warn' : '');
      document.getElementById('ramText').textContent = m.used_mb + '/' + m.total_mb + ' MB';
    }
  } catch(e) {}
}

async function fetchTree() {
  try {
    const j = await (await fetch('/tree')).json();
    for (const n of (j.nodes || [])) {
      treeNodes.set(n.agent_id, n);
      if (sprites.has(n.agent_id)) {
        const sp = sprites.get(n.agent_id);
        sp.kind = n.kind || sp.kind;
        sp.goal = n.goal || '';
        if (n.state) sp.state = n.state;
      }
    }
  } catch(e) {}
}

async function fetchState() {
  try {
    const j = await (await fetch('/state')).json();
    const seen = new Set();
    for (const a of (j.agents || [])) {
      seen.add(a.agent_id);
      upsertSprite(a.agent_id, a.state, a.detail);
    }
    for (const [id, sp] of sprites) {
      if (!seen.has(id) && sp.state !== 'DONE' && !sp.fadeOut) {
        sp.state = 'DONE';
      }
    }
  } catch(e) {}
  layoutSprites();
  document.getElementById('agentCount').textContent = sprites.size + ' agent' + (sprites.size === 1 ? '' : 's');
}

function upsertSprite(id, state, detail) {
  if (sprites.has(id)) {
    const sp = sprites.get(id);
    sp.state = state;
    sp.detail = detail || '';
  } else {
    const node = treeNodes.get(id) || {};
    const sp = new Sprite(id, state, node.kind || 'specialist');
    sp.detail = detail || '';
    sprites.set(id, sp);
  }
}

// SSE for instant updates
const es = new EventSource('/events');
es.onmessage = msg => {
  try {
    const d = JSON.parse(msg.data);
    if (d.type === 'snapshot') {
      for (const a of (d.agents || [])) {
        upsertSprite(a.agent_id, a.state, a.detail || '');
      }
    } else if (d.type === 'event') {
      upsertSprite(d.agent_id, d.state, d.detail || '');
    }
    layoutSprites();
    document.getElementById('agentCount').textContent = sprites.size + ' agent' + (sprites.size === 1 ? '' : 's');
  } catch(e) {}
};

// ---- launch bar ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('btnMission').onclick = async () => {
  const prompt = document.getElementById('goalInput').value.trim();
  if (!prompt) return;
  await fetchModels();
  const model = models[0] || 'llama3.2:3b';
  try {
    const r = await fetch('/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: 'mission', model, prompt, mode: 'bypass', swarm: true}),
    });
    const j = await r.json();
    if (j.queued) {
      showToast('mission dispatched: ' + j.queued.slice(0, 16));
      document.getElementById('goalInput').value = '';
    } else {
      showToast('error: ' + (j.error || 'unknown'));
    }
  } catch(e) { showToast('error: ' + e); }
};

document.getElementById('btnRun').onclick = async () => {
  const prompt = document.getElementById('goalInput').value.trim();
  if (!prompt) return;
  await fetchModels();
  const model = models[0] || 'llama3.2:3b';
  try {
    const r = await fetch('/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: 'agent', model, prompt, mode: 'bypass', swarm: false}),
    });
    const j = await r.json();
    if (j.queued) {
      showToast('agent dispatched');
      document.getElementById('goalInput').value = '';
    } else {
      showToast('error: ' + (j.error || 'unknown'));
    }
  } catch(e) { showToast('error: ' + e); }
};

document.getElementById('btnGrow').onclick = async () => {
  await fetchModels();
  const model = models[0] || 'llama3.2:3b';
  try {
    const r = await fetch('/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: 'grow', model, mode: 'bypass', grow: true}),
    });
    const j = await r.json();
    if (j.queued) showToast('growth loop running: hearth is improving itself');
    else showToast('error: ' + (j.error || 'unknown'));
  } catch(e) { showToast('error: ' + e); }
};

document.getElementById('goalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnMission').click();
});

// ---- growth ledger ----
let growthTimer = null;
async function refreshGrowth() {
  try {
    const r = await fetch('/growth');
    const g = await r.json();
    const active = (g.daemon === 'active');
    document.getElementById('growth-dot').className = 'dot ' + (active ? 'on' : 'off');
    document.getElementById('growth-daemon').textContent = 'daemon: ' + (g.daemon || '--');
    document.getElementById('growth-count').textContent =
      (g.validated_count || 0) + ' validated';
    document.getElementById('growth-merged').textContent =
      (g.merged_count || 0) + ' merged';
    const tgl = document.getElementById('growth-toggle');
    tgl.textContent = active ? 'stop' : 'start';
    tgl.dataset.action = active ? 'stop' : 'start';
    const body = document.getElementById('growth-body');
    if (!g.lessons || !g.lessons.length) {
      body.innerHTML = '<div style="color:#5a7fa0;padding:14px 0">no self-improvement activity yet. start the daemon or click "grow hearth".</div>';
    } else {
      body.innerHTML = g.lessons.map(l => {
        const k = (l.kind || 'lesson').toLowerCase();
        const cls = (k === 'success' || k === 'failure') ? k : 'lesson';
        return '<div class="grow-item ' + cls + '"><div class="gi-kind">' + esc(l.kind || 'lesson') +
          '</div><div class="gi-text">' + esc(l.insight || '') + '</div></div>';
      }).join('');
    }
    const br = document.getElementById('growth-branches');
    if (g.branches && g.branches.length) {
      br.innerHTML = '<div class="gb-title">validated branches (review + merge)</div>' +
        g.branches.map(b => '<div>' + esc(b) + '</div>').join('');
    } else { br.innerHTML = ''; }
  } catch(e) { /* keep last view on transient error */ }
}
document.getElementById('btnLedger').onclick = () => {
  const p = document.getElementById('growth');
  const open = p.classList.toggle('open');
  if (open) {
    refreshGrowth(); refreshPromoteStatus();
    growthTimer = setInterval(() => { refreshGrowth(); refreshPromoteStatus(); }, 4000);
  } else if (growthTimer) { clearInterval(growthTimer); growthTimer = null; }
};
document.getElementById('growth-close').onclick = () => {
  document.getElementById('growth').classList.remove('open');
  if (growthTimer) { clearInterval(growthTimer); growthTimer = null; }
};
document.getElementById('growth-toggle').onclick = async (e) => {
  const action = e.target.dataset.action || 'start';
  e.target.textContent = '...';
  try {
    const r = await fetch('/grow-daemon', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action}),
    });
    const j = await r.json();
    showToast(j.ok ? ('growth daemon ' + action + 'ed') : ('error: ' + (j.detail || 'failed')));
  } catch(err) { showToast('error: ' + err); }
  setTimeout(refreshGrowth, 800);
};

// ---- promote to live ----
async function refreshPromoteStatus() {
  try {
    const s = await (await fetch('/promote/status')).json();
    const el = document.getElementById('pr-status');
    if (s.running) el.textContent = 'running: ' + (s.result || 'in progress') + '\n' + (s.tail || '');
    else if (s.result) el.textContent = 'last: ' + s.result + '\n' + (s.tail || '');
    else el.textContent = 'idle';
  } catch(e) {}
  try {
    const h = (await (await fetch('/promote/history')).json()).history || [];
    const hist = document.getElementById('pr-history');
    hist.innerHTML = h.length
      ? h.map(e => '<div class="ph ' + (e.ok ? 'ok' : 'bad') + '">' +
          esc((e.ts || '').replace('T', ' ').slice(0, 19)) + '  ' + esc(e.mode) +
          '  ' + (e.ok ? 'ok' : 'FAILED(' + esc(e.rc) + ')') + '</div>').join('')
      : '';
  } catch(e) {}
}
document.getElementById('pr-diff').onclick = async () => {
  const out = document.getElementById('pr-diff-out');
  if (out.style.display === 'block') { out.style.display = 'none'; return; }
  out.style.display = 'block';
  out.textContent = 'loading diff...';
  try {
    const j = await (await fetch('/promote/diff')).json();
    out.textContent = j.diff || '(no diff)';
  } catch(e) { out.textContent = 'error: ' + e; }
};
async function promote(mode, confirmMsg) {
  if (confirmMsg && !confirm(confirmMsg)) return;
  document.getElementById('pr-status').textContent = mode + ' starting...';
  try {
    const j = await (await fetch('/promote', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mode})})).json();
    showToast(j.ok ? ('promote ' + mode + ' started') : ('error: ' + (j.detail || 'failed')));
  } catch(e) { showToast('error: ' + e); }
  setTimeout(refreshPromoteStatus, 1200);
}
document.getElementById('pr-build').onclick = () => promote('build');
document.getElementById('pr-switch').onclick = () => promote('switch',
  'Apply the growth daemon\'s compounded improvements to the LIVE system and activate them?\n\nNixOS keeps the current generation, so you can roll back. Recommended: run build-check first.');
document.getElementById('pr-rollback').onclick = () => promote('rollback',
  'Roll the live system back to the previous NixOS generation?');

// ---- demo agents for offline testing ----
let demoInjected = false;
function injectDemoIfEmpty() {
  if (demoInjected) return;
  if (sprites.size > 0) return;
  demoInjected = true;
  const demoAgents = [
    {id: 'manager-1', state: 'WAITING_IO', kind: 'manager'},
    {id: 'worker-a', state: 'TOOL_CALL', kind: 'specialist', parent: 'manager-1'},
    {id: 'worker-b', state: 'THINKING', kind: 'specialist', parent: 'manager-1'},
    {id: 'scout-1', state: 'IDLE', kind: 'specialist'},
    {id: 'analyst-2', state: 'WAITING_APPROVAL', kind: 'specialist'},
  ];
  for (const a of demoAgents) {
    const sp = new Sprite(a.id, a.state, a.kind);
    sprites.set(a.id, sp);
    if (a.parent) treeNodes.set(a.id, {agent_id: a.id, parent_id: a.parent, kind: a.kind, goal: 'demo task'});
    else treeNodes.set(a.id, {agent_id: a.id, parent_id: null, kind: a.kind, goal: 'demo goal'});
  }
  layoutSprites();
  document.getElementById('agentCount').textContent = sprites.size + ' agents (demo)';
}
setTimeout(injectDemoIfEmpty, 2500);

// ---- main loop ----
let lastT = performance.now();
function loop(now) {
  const dt = Math.min((now - lastT) / 16.67, 3);
  lastT = now;

  ctx.clearRect(0, 0, W, H);

  updateDust();
  updateCrt();
  drawWorld();
  drawDust();
  drawRoomZones();
  drawTethers();

  // update and draw sprites (managers on top)
  const sorted = [...sprites.values()].sort((a, b) => (a.isManager() ? 1 : 0) - (b.isManager() ? 1 : 0));
  for (const sp of sorted) {
    sp.update(dt);
    if (sp.done) sprites.delete(sp.id);
  }
  for (const sp of sorted) {
    if (!sp.done) sp.draw();
  }

  drawMinimap();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ---- polling ----
fetchModels();
fetchStats();
fetchTree();
fetchState();
setInterval(fetchStats, 3000);
setInterval(() => { fetchTree(); fetchState(); }, 1500);
</script>
