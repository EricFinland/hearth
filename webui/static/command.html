<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>hearth command</title>
<style>
  #worldLink {
    position: fixed; top: 10px; right: 14px; z-index: 100;
    font-size: 10px; color: #8a93a0; text-decoration: none;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    border: 1px solid #16324f; padding: 2px 8px; border-radius: 6px;
    background: rgba(5,8,15,0.7);
  }
  #worldLink:hover { color: #5fd0ff; border-color: #5fd0ff; }
</style>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#05080f; color:#cfe6ff;
    font-family: ui-monospace, Menlo, Consolas, monospace; overflow:hidden; }
  #bg { position:fixed; inset:0; z-index:0; }
  #grid { position:fixed; inset:0; z-index:1; display:grid;
    grid-template-columns: 320px 1fr; grid-template-rows: auto auto 1fr 140px auto; gap:14px; padding:14px; }
  .card { background:rgba(8,14,24,0.62); border:1px solid #16324f; border-radius:10px;
    padding:10px 12px; backdrop-filter: blur(3px); overflow:auto; }
  .title { color:#5fd0ff; text-transform:uppercase; letter-spacing:.08em; font-size:12px; margin-bottom:8px; }
  #map { grid-column: 2 / 3; grid-row: 1 / 4; }
  #stats { grid-column: 1 / 2; grid-row: 1 / 2; }
  #chat { grid-column: 1 / 2; grid-row: 2 / 3; }
  #launch { grid-column: 1 / 2; grid-row: 3 / 4; }
  #activity { grid-column: 1 / 3; grid-row: 4 / 5; }
  /* On narrow screens (phones/tablets), stack everything in one scrolling column. */
  @media (max-width: 720px) {
    #grid { position: static; display: block; padding: 10px; height: auto; }
    #grid > .card { grid-column: auto !important; grid-row: auto !important;
      width: auto; margin-bottom: 12px; max-height: 60vh; }
  }
  #chat select, #launch select { background:#0e2236; border:1px solid #16324f; color:#cfe6ff;
    padding:6px; border-radius:6px; }
  .agent { display:inline-block; margin:4px 8px; }
  .bar { height:8px; background:#0e2236; border-radius:4px; overflow:hidden; margin:4px 0 10px; }
  .bar > i { display:block; height:100%; background:linear-gradient(90deg,#1c6,#5fd0ff); }
  .row { font-size:12px; opacity:.9; white-space:nowrap; }
</style></head>
<body>
<canvas id="bg"></canvas>
<a id="worldLink" href="/world">world</a>
<div id="grid">
  <div class="card" id="stats"><div class="title">system</div><div id="statsBody">loading...</div></div>
  <div class="card" id="chat">
    <div class="title">chat</div>
    <select id="chatModel"></select>
    <div id="chatLog" style="height:160px;overflow:auto;margin:6px 0;font-size:12px;"></div>
    <div style="display:flex;gap:6px;">
      <input id="chatInput" placeholder="message your local model..." style="flex:1;background:#0e2236;border:1px solid #16324f;color:#cfe6ff;padding:6px;border-radius:6px;" />
      <button id="chatSend" style="background:#16324f;color:#cfe6ff;border:0;border-radius:6px;padding:6px 12px;cursor:pointer;">send</button>
    </div>
  </div>
  <div class="card" id="launch">
    <div class="title">launch agent</div>
    <input id="agName" placeholder="name (e.g. researcher)" style="width:100%;margin-bottom:4px;background:#0e2236;border:1px solid #16324f;color:#cfe6ff;padding:6px;border-radius:6px;box-sizing:border-box;" />
    <select id="agModel" style="width:100%;margin-bottom:4px;"></select>
    <select id="agMode" style="width:100%;margin-bottom:4px;">
      <option value="plan">plan (look only)</option>
      <option value="auto" selected>auto (ask on risky)</option>
      <option value="bypass">bypass (no prompts)</option>
    </select>
    <input id="agCreds" placeholder="allowed creds (optional, comma-separated)" style="width:100%;margin-bottom:4px;background:#0e2236;border:1px solid #16324f;color:#cfe6ff;padding:6px;border-radius:6px;box-sizing:border-box;" />
    <textarea id="agTask" placeholder="task for the agent..." style="width:100%;height:60px;background:#0e2236;border:1px solid #16324f;color:#cfe6ff;padding:6px;border-radius:6px;box-sizing:border-box;"></textarea>
    <div style="display:flex;gap:6px;margin-top:4px;">
      <button id="agSession" style="flex:1;background:#1c6;color:#04150c;border:0;border-radius:6px;padding:6px 12px;cursor:pointer;">open session</button>
      <button id="agLaunch" style="flex:1;background:#16324f;color:#cfe6ff;border:0;border-radius:6px;padding:6px 12px;cursor:pointer;">run in background</button>
      <button id="agMission" style="flex:1;background:#5fd0ff;color:#04150c;border:0;border-radius:6px;padding:6px 12px;cursor:pointer;">launch mission</button>
      <button id="agMarathon" style="flex:1;background:#b08cff;color:#04150c;border:0;border-radius:6px;padding:6px 12px;cursor:pointer;">marathon</button>
      <button id="agEvolve" style="flex:1;background:#6fcf7f;color:#04150c;border:0;border-radius:6px;padding:6px 12px;cursor:pointer;">self-evolve</button>
      <button id="agGrow" style="flex:1;background:#ffb347;color:#04150c;border:0;border-radius:6px;padding:6px 12px;cursor:pointer;">grow hearth</button>
    </div>
    <div id="agMsg" style="font-size:12px;margin-top:6px;"></div>
  </div>
  <div class="card" id="map"><div class="title">agents</div><div id="mapBody"></div></div>
  <div class="card" id="missions" style="display:none;"><div class="title">missions</div><div id="missionsBody"></div></div>
  <div class="card" id="session" style="display:none;grid-column:2/3;grid-row:1/4;flex-direction:column;">
    <div class="title" style="display:flex;justify-content:space-between;align-items:center;">
      <span>session <span id="sessId" style="color:#8a93a0;"></span></span>
      <span>
        <select id="sessMode" style="background:#0e2236;border:1px solid #16324f;color:#cfe6ff;border-radius:6px;padding:2px;">
          <option value="plan">plan</option><option value="auto">auto</option><option value="bypass">bypass</option>
        </select>
        <button id="sessStop" style="background:#a33;color:#fff;border:0;border-radius:6px;padding:4px 10px;cursor:pointer;">stop</button>
        <button id="sessClose" style="background:#16324f;color:#cfe6ff;border:0;border-radius:6px;padding:4px 10px;cursor:pointer;">close</button>
      </span>
    </div>
    <div id="sessBanner" style="display:none;background:#5a1414;color:#ffd7d7;padding:4px 8px;border-radius:6px;margin-bottom:6px;font-size:12px;">BYPASS MODE: this agent runs every action without asking.</div>
    <div id="sessLog" style="flex:1;overflow:auto;font-size:12px;line-height:1.5;"></div>
    <div style="display:flex;gap:6px;margin-top:6px;">
      <input id="sessInput" placeholder="send a follow-up to the agent..." style="flex:1;background:#0e2236;border:1px solid #16324f;color:#cfe6ff;padding:6px;border-radius:6px;" />
      <button id="sessSend" style="background:#16324f;color:#cfe6ff;border:0;border-radius:6px;padding:6px 12px;cursor:pointer;">send</button>
    </div>
  </div>
  <div class="card" id="activity"><div class="title">activity</div><div id="actBody"></div></div>
  <div class="card" id="pending" style="grid-column:1/3;grid-row:5/6;display:none;">
    <div class="title">pending approvals</div>
    <div id="pendBody"></div>
  </div>
  <div class="card" id="statsHist" style="grid-column:1/3;">
    <div class="title">usage over time</div>
    <div id="statsHistBody" style="font-size:12px;">loading...</div>
  </div>
  <div class="card" id="sched" style="grid-column:1/3;">
    <div class="title">standing missions</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;">
      <input id="scName" placeholder="name" style="flex:1;min-width:90px;background:#0e2236;border:1px solid #16324f;color:#cfe6ff;padding:5px;border-radius:6px;" />
      <select id="scKind" style="background:#0e2236;border:1px solid #16324f;color:#cfe6ff;padding:5px;border-radius:6px;"><option value="agent">agent</option><option value="marathon">marathon</option><option value="swarm">swarm</option></select>
      <input id="scEvery" placeholder="every N min" style="width:90px;background:#0e2236;border:1px solid #16324f;color:#cfe6ff;padding:5px;border-radius:6px;" />
      <input id="scAt" placeholder="or at HH:MM" style="width:90px;background:#0e2236;border:1px solid #16324f;color:#cfe6ff;padding:5px;border-radius:6px;" />
      <button id="scAdd" style="background:#ffb347;color:#04150c;border:0;border-radius:6px;padding:5px 12px;cursor:pointer;">add</button>
    </div>
    <textarea id="scGoal" placeholder="mission goal (what should it do each run?)" style="width:100%;height:42px;background:#0e2236;border:1px solid #16324f;color:#cfe6ff;padding:5px;border-radius:6px;box-sizing:border-box;margin-bottom:6px;"></textarea>
    <div id="schedBody" style="font-size:12px;"></div>
  </div>
</div>
<script>
const STATE_ICONS={SPAWNING:"*",IDLE:"z",THINKING:"?",TOOL_CALL:"+",WAITING_IO:"~",WAITING_APPROVAL:"!?",ERRORED:"!",DONE:"#"};
const bg=document.getElementById("bg"),bx=bg.getContext("2d");
let parts=[];
function sizeBg(){bg.width=innerWidth;bg.height=innerHeight;
  parts=Array.from({length:90},()=>({x:Math.random()*bg.width,y:Math.random()*bg.height,
    v:0.2+Math.random()*0.6,r:0.5+Math.random()*1.8}));}
addEventListener("resize",sizeBg);sizeBg();
function drawBg(){bx.fillStyle="#05080f";bx.fillRect(0,0,bg.width,bg.height);
  for(const p of parts){p.y-=p.v;if(p.y<0){p.y=bg.height;p.x=Math.random()*bg.width;}
    bx.fillStyle="rgba(95,208,255,0.5)";bx.beginPath();bx.arc(p.x,p.y,p.r,0,7);bx.fill();}
  requestAnimationFrame(drawBg);}
requestAnimationFrame(drawBg);
const agents=new Map();
function renderAgents(){document.getElementById("mapBody").innerHTML=
  [...agents.values()].sort((a,b)=>a.agent_id<b.agent_id?-1:1)
  .map(a=>`<span class="agent">${STATE_ICONS[a.state]||"?"} ${a.agent_id}<br><small>${(a.state||"").toLowerCase()}</small></span>`).join("")||"(no agents)";}
async function refreshStats(){try{const s=await(await fetch("/stats")).json();
  const g=s.gpu,m=s.mem;let h="";
  if(g){h+=`GPU ${g.name}<div class="bar"><i style="width:${g.util_pct}%"></i></div>`+
    `VRAM ${g.mem_used_mb}/${g.mem_total_mb} MB<div class="bar"><i style="width:${100*g.mem_used_mb/g.mem_total_mb}%"></i></div>`;}
  else h+="GPU unavailable<br>";
  if(m)h+=`RAM ${m.used_mb}/${m.total_mb} MB<div class="bar"><i style="width:${100*m.used_mb/m.total_mb}%"></i></div>`;
  document.getElementById("statsBody").innerHTML=h;}catch(e){}}
setInterval(refreshStats,2000);refreshStats();
function logLine(t){const b=document.getElementById("actBody");
  b.innerHTML=`<div class="row">${t}</div>`+b.innerHTML.split("</div>").slice(0,40).join("</div>");}
const es=new EventSource("/events");
es.onmessage=m=>{const d=JSON.parse(m.data);
  if(d.type==="snapshot"){agents.clear();(d.agents||[]).forEach(a=>agents.set(a.agent_id,a));}
  else if(d.type==="event"){agents.set(d.agent_id,{agent_id:d.agent_id,state:d.state});
    logLine(`${(d.ts||"").slice(11,19)}  ${d.agent_id}  ${d.state.toLowerCase()}  ${d.detail||""}`);}
  renderAgents();};
fetch("/state").then(r=>r.json()).then(j=>{(j.agents||[]).forEach(a=>agents.set(a.agent_id,a));renderAgents();});
const chatMessages=[];
async function loadModels(){try{const j=await(await fetch("/models")).json();
  const sel=document.getElementById("chatModel");sel.innerHTML=(j.models||[]).map(n=>`<option>${n}</option>`).join("")||"<option>llama3.2:3b</option>";}catch(e){}}
loadModels();
function appendChat(role,text){const l=document.getElementById("chatLog");
  l.innerHTML+=`<div><b style="color:${role==='you'?'#5fd0ff':'#6fcf7f'}">${role}:</b> ${text.replace(/</g,'&lt;')}</div>`;l.scrollTop=l.scrollHeight;}
async function sendChat(){const inp=document.getElementById("chatInput");const text=inp.value.trim();if(!text)return;
  inp.value="";appendChat("you",text);chatMessages.push({role:"user",content:text});
  const model=document.getElementById("chatModel").value;
  appendChat("...","thinking");
  try{const r=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model,messages:chatMessages,agent_name:"chat"})});
    const j=await r.json();const l=document.getElementById("chatLog");l.lastChild.remove();
    if(j.error){appendChat("error",j.error);}else{appendChat(model,j.reply);chatMessages.push({role:"assistant",content:j.reply});}
  }catch(e){appendChat("error",String(e));}}
document.getElementById("chatSend").onclick=sendChat;
document.getElementById("chatInput").addEventListener("keydown",e=>{if(e.key==="Enter")sendChat();});
async function loadAgModels(){try{const j=await(await fetch("/models")).json();
  document.getElementById("agModel").innerHTML=(j.models||[]).map(n=>`<option>${n}</option>`).join("")||"<option>llama3.2:3b</option>";}catch(e){}}
loadAgModels();
document.getElementById("agLaunch").onclick=async()=>{
  const name=document.getElementById("agName").value.trim()||"agent";
  const model=document.getElementById("agModel").value;
  const prompt=document.getElementById("agTask").value.trim();
  const msg=document.getElementById("agMsg");
  if(!prompt){msg.textContent="enter a task";return;}
  msg.textContent="launching...";
  const mode=document.getElementById("agMode").value;
  const creds=document.getElementById("agCreds").value.trim();
  try{const r=await fetch("/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,model,prompt,mode,creds})});
    const j=await r.json();
    if(j.queued){msg.textContent="launched "+j.queued+" (watch the map)";document.getElementById("agTask").value="";}
    else msg.textContent="error: "+(j.error||"unknown");}
  catch(e){msg.textContent="error: "+e;}};
// ---- interactive session console ----
let sessionES=null, sessionId=null;
const sessEl=id=>document.getElementById(id);
function sessAppend(html){const l=sessEl("sessLog");l.insertAdjacentHTML("beforeend",html);l.scrollTop=l.scrollHeight;}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function showSession(on){
  sessEl("session").style.display=on?"flex":"none";
  document.getElementById("map").style.display=on?"none":"";
}
function decide(id,allow){
  fetch(`/session/${sessionId}/send`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"decision",id,allow})});
}
function renderEvent(d){
  if(d.type==="message"){sessAppend(`<div><b style="color:#6fcf7f">agent:</b> ${esc(d.content)}</div>`);}
  else if(d.type==="tool_result"){
    const tag=d.denied?'<span style="color:#e06a6a">denied</span>':'<span style="color:#5fd0ff">ran</span>';
    sessAppend(`<div style="opacity:.85">${tag} <b>${esc(d.tool)}</b><pre style="white-space:pre-wrap;margin:2px 0;color:#9fb6cc">${esc(d.output||"")}</pre></div>`);}
  else if(d.type==="tool_request"){
    const l=sessEl("sessLog");
    const card=document.createElement("div");
    card.style.cssText="border:1px solid #6a5a1a;background:#241f0e;border-radius:6px;padding:6px;margin:4px 0;";
    card.innerHTML=`<div><b style="color:#f0a030">approve?</b> <b>${esc(d.tool)}</b> <small style="color:#8a93a0">(${esc(d.risk)})</small></div>`+
      `<pre style="white-space:pre-wrap;margin:4px 0;color:#cfe6ff">${esc(JSON.stringify(d.args))}</pre>`;
    const rid=d.id;
    const ok=document.createElement("button");
    ok.textContent="approve";
    ok.style.cssText="background:#1c6;color:#04150c;border:0;border-radius:6px;padding:3px 10px;cursor:pointer;";
    ok.onclick=()=>{decide(rid,true);card.remove();};
    const no=document.createElement("button");
    no.textContent="deny";
    no.style.cssText="background:#a33;color:#fff;border:0;border-radius:6px;padding:3px 10px;cursor:pointer;margin-left:6px;";
    no.onclick=()=>{decide(rid,false);card.remove();};
    card.appendChild(ok);
    card.appendChild(no);
    l.appendChild(card);
    l.scrollTop=l.scrollHeight;
  }
  else if(d.type==="plan"){sessAppend(`<div style="border-left:3px solid #5fd0ff;padding-left:8px;margin:4px 0;"><b style="color:#5fd0ff">plan</b><pre style="white-space:pre-wrap;margin:2px 0">${esc(d.content)}</pre></div>`);}
  else if(d.type==="state"){if(d.state==="WAITING_APPROVAL")sessAppend(`<div style="color:#f0a030;font-size:11px">awaiting approval...</div>`);}
  else if(d.type==="notice"){sessAppend(`<div style="color:#f0a030;font-size:11px">${esc(d.detail)}</div>`);}
  else if(d.type==="turn_done"){if(d.error)sessAppend(`<div style="color:#e06a6a;font-size:11px">turn ended: ${esc(d.error)}</div>`);}
  else if(d.type==="closed"||d.type==="done"){sessAppend(`<div style="color:#8a93a0;font-size:11px">[session ended]</div>`);}
}
function openSession(id,mode){
  sessionId=id; showSession(true);
  sessEl("sessLog").innerHTML=""; sessEl("sessId").textContent=id;
  sessEl("sessMode").value=mode; sessEl("sessBanner").style.display=mode==="bypass"?"block":"none";
  if(sessionES)sessionES.close();
  sessionES=new EventSource(`/session/${id}/events`);
  sessionES.onmessage=m=>{try{renderEvent(JSON.parse(m.data));}catch(e){}};
}
sessEl("agSession").onclick=async()=>{
  const name=sessEl("agName").value.trim()||"session";
  const model=sessEl("agModel").value, mode=sessEl("agMode").value;
  const task=sessEl("agTask").value.trim();
  sessEl("agMsg").textContent="opening session...";
  try{const r=await fetch("/session",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name,model,mode,task,creds:sessEl("agCreds").value.trim()})});
    const j=await r.json();
    if(j.id){sessEl("agMsg").textContent="session open"; sessEl("agTask").value=""; openSession(j.id,j.mode);}
    else sessEl("agMsg").textContent="error: "+(j.error||"unknown");
  }catch(e){sessEl("agMsg").textContent="error: "+e;}
};
sessEl("sessSend").onclick=()=>{
  const t=sessEl("sessInput").value.trim(); if(!t||!sessionId)return;
  sessEl("sessInput").value=""; sessAppend(`<div><b style="color:#5fd0ff">you:</b> ${esc(t)}</div>`);
  fetch(`/session/${sessionId}/send`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"user_message",text:t})});
};
sessEl("sessInput").addEventListener("keydown",e=>{if(e.key==="Enter")sessEl("sessSend").onclick();});
sessEl("sessMode").onchange=()=>{
  if(!sessionId)return; const m=sessEl("sessMode").value;
  sessEl("sessBanner").style.display=m==="bypass"?"block":"none";
  fetch(`/session/${sessionId}/send`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"set_mode",mode:m})});
};
sessEl("sessStop").onclick=()=>{if(sessionId)fetch(`/session/${sessionId}/send`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"stop"})});};
sessEl("sessClose").onclick=()=>{if(sessionES)sessionES.close(); sessionES=null; sessionId=null; showSession(false);};
// ---- background-worker approvals queue ----
async function refreshPending(){
  try{
    const j=await (await fetch("/pending")).json();
    const list=j.pending||[];
    const card=document.getElementById("pending");
    card.style.display=list.length?"block":"none";
    document.getElementById("pendBody").innerHTML=list.map(p=>
      `<div style="border:1px solid #6a5a1a;background:#241f0e;border-radius:6px;padding:6px;margin:4px 0;">
        <div><b style="color:#f0a030">${esc(p.agent_id)}</b> wants <b>${esc(p.tool)}</b> <small style="color:#8a93a0">(${esc(p.risk)})</small></div>
        <pre style="white-space:pre-wrap;margin:4px 0;color:#cfe6ff">${esc(JSON.stringify(p.args))}</pre>
        <button onclick="decideAction(${p.id},true)" style="background:#1c6;color:#04150c;border:0;border-radius:6px;padding:3px 10px;cursor:pointer;">approve</button>
        <button onclick="decideAction(${p.id},false)" style="background:#a33;color:#fff;border:0;border-radius:6px;padding:3px 10px;cursor:pointer;margin-left:6px;">deny</button>
      </div>`).join("");
  }catch(e){console.warn("pending refresh failed",e);}
}
function decideAction(id,allow){
  fetch("/decide",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,allow})}).then(()=>refreshPending());
}
setInterval(refreshPending,2500); refreshPending();
// ---- mission control: render the swarm tree from /tree ----
const STATE_DOT={SPAWNING:"*",IDLE:"z",THINKING:"?",TOOL_CALL:"+",WAITING_IO:"~",WAITING_APPROVAL:"!?",ERRORED:"!",DONE:"#"};
async function refreshMissions(){
  try{
    const j=await(await fetch("/tree")).json();
    const nodes=j.nodes||[];
    const card=document.getElementById("missions");
    card.style.display=nodes.length?"block":"none";
    const byParent={};
    nodes.forEach(n=>{(byParent[n.parent_id||""]=byParent[n.parent_id||""]||[]).push(n);});
    const line=n=>`<div style="margin:2px 0;"><b style="color:#5fd0ff">${STATE_DOT[n.state]||"?"}</b> ${esc(n.agent_id)} <small style="color:#8a93a0">${esc(n.kind||"")} ${esc((n.state||"").toLowerCase())}</small>${esc(n.goal? " - "+n.goal.slice(0,60):"")}</div>`;
    const roots=nodes.filter(n=>!n.parent_id);
    document.getElementById("missionsBody").innerHTML=roots.map(r=>
      `<div style="border-left:3px solid #16324f;padding-left:8px;margin:6px 0;">${line(r)}<div style="margin-left:14px;">${(byParent[r.agent_id]||[]).map(line).join("")}</div></div>`).join("")||"(no missions yet)";
  }catch(e){}
}
setInterval(refreshMissions,3000); refreshMissions();
document.getElementById("agMission").onclick=async()=>{
  const name=document.getElementById("agName").value.trim()||"mission";
  const model=document.getElementById("agModel").value;
  const prompt=document.getElementById("agTask").value.trim();
  const msg=document.getElementById("agMsg");
  if(!prompt){msg.textContent="enter a goal";return;}
  msg.textContent="launching mission...";
  try{const r=await fetch("/run",{method:"POST",headers:{"Content-Type":"application/json"},

// ---- usage over time ----
async function refreshStatsHist(){
  try{
    const s=await(await fetch("/stats/history")).json();
    const t=s.totals||{};
    const days=s.by_day||[];
    const maxTok=Math.max(1,...days.map(d=>d.tokens));
    const bars=days.map(d=>{
      const h=Math.round(4+(d.tokens/maxTok)*44);
      return `<div style="display:inline-block;width:24px;text-align:center;vertical-align:bottom;">
        <div title="${esc(d.day)}: ${d.runs} runs, ${d.tokens} tokens" style="height:${h}px;background:#5fd0ff;border-radius:2px 2px 0 0;margin:0 1px;"></div>
        <small style="color:#8a93a0;font-size:8px;">${esc(d.day.slice(5))}</small></div>`;}).join("");
    const models=(s.by_model||[]).map(m=>`<div style="color:#9fb6cc;">${esc(m.model)}: ${m.runs} runs, ${m.tokens} tok</div>`).join("");
    document.getElementById("statsHistBody").innerHTML=
      `<div style="color:#cfe6ff;margin-bottom:6px;">${t.runs||0} runs total &middot; ${(t.tokens||0).toLocaleString()} tokens &middot; ${t.errors||0} errored</div>
       <div style="display:flex;align-items:flex-end;gap:0;min-height:54px;overflow-x:auto;">${bars||"<small style='color:#8a93a0'>no runs yet</small>"}</div>
       <div style="margin-top:8px;font-size:11px;">${models}</div>`;
  }catch(e){}
}
setInterval(refreshStatsHist,5000); refreshStatsHist();

// ---- standing missions (scheduler) ----
async function refreshSched(){
  try{
    const s=await(await fetch("/schedule")).json();
    const ms=s.missions||[];
    document.getElementById("schedBody").innerHTML=ms.length?ms.map(m=>{
      const sc=m.schedule||{};
      const when=sc.every_minutes?("every "+sc.every_minutes+"m"):(sc.at?("daily "+sc.at):"?");
      return `<div style="display:flex;align-items:center;gap:8px;border-left:3px solid ${m.enabled?"#6fcf7f":"#5a2a2a"};padding:3px 8px;margin:3px 0;">
        <b style="color:#cfe6ff">${esc(m.name||m.id)}</b>
        <small style="color:#8a93a0">${esc(m.kind||"agent")} &middot; ${esc(when)}${m.last_run?(" &middot; last "+esc(m.last_run.slice(5,16))):""}</small>
        <span style="margin-left:auto;"></span>
        <button data-id="${esc(m.id)}" class="scTgl" style="background:none;border:1px solid #16324f;color:#9fb6cc;border-radius:5px;font-size:10px;cursor:pointer;padding:2px 7px;">${m.enabled?"pause":"resume"}</button>
        <button data-id="${esc(m.id)}" class="scDel" style="background:none;border:1px solid #5a2a2a;color:#e06a6a;border-radius:5px;font-size:10px;cursor:pointer;padding:2px 7px;">delete</button>
      </div>`;}).join(""):"<small style='color:#8a93a0'>no standing missions. add one above.</small>";
    document.querySelectorAll(".scTgl").forEach(b=>b.onclick=async()=>{await fetch("/schedule/"+b.dataset.id+"/toggle",{method:"POST"});refreshSched();});
    document.querySelectorAll(".scDel").forEach(b=>b.onclick=async()=>{await fetch("/schedule/"+b.dataset.id+"/delete",{method:"POST"});refreshSched();});
  }catch(e){}
}
document.getElementById("scAdd").onclick=async()=>{
  const body={name:document.getElementById("scName").value.trim(),goal:document.getElementById("scGoal").value.trim(),
    kind:document.getElementById("scKind").value,model:document.getElementById("agModel").value};
  const ev=document.getElementById("scEvery").value.trim(), at=document.getElementById("scAt").value.trim();
  if(ev)body.every_minutes=ev; else if(at)body.at=at;
  if(!body.goal||(!ev&&!at)){alert("need a goal and a schedule (every N min, or at HH:MM)");return;}
  const r=await fetch("/schedule",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const j=await r.json();
  if(j.id){document.getElementById("scGoal").value="";document.getElementById("scName").value="";document.getElementById("scEvery").value="";document.getElementById("scAt").value="";refreshSched();}
  else alert("error: "+(j.error||"failed"));
};
setInterval(refreshSched,5000); refreshSched();
