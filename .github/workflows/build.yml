name: build

# Validate the flake on every push and PR to main. The image build step is
# informational in CI (it is slow); the real image build happens locally with
# scripts/build-image.sh.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: "experimental-features = nix-command flakes"

      - name: Flake check
        run: nix flake check

      - name: Image build (informational)
        continue-on-error: true
        run: nix run github:nix-community/nixos-generators -- --format qcow --flake .#workstation
