<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="hearth: security-first NixOS for local LLMs and sandboxed agents">
  <defs>
    <radialGradient id="glow" cx="14%" cy="48%" r="38%">
      <stop offset="0%" stop-color="#cc785c" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#cc785c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#eab59e"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="360" fill="#1c1813"/>
  <rect width="1200" height="6" fill="url(#bar)"/>
  <rect width="1200" height="360" fill="url(#glow)"/>

  <!-- flame -->
  <g transform="translate(70,96) scale(5.0)">
    <path d="M16 3 C 11 10 8 13 8 19 a8 8 0 0 0 16 0 c0 -4 -3 -7 -5 -9 c0 2 -1 3 -2 3 c1 -4 -1 -9 -1 -13 z" fill="#cc785c">
      <animate attributeName="opacity" values="1;0.82;1" dur="2.6s" repeatCount="indefinite"/>
    </path>
    <path d="M16 12 C 14 15 13 16 13 19.5 a3 3 0 0 0 6 0 c0 -2 -1 -3 -2 -4 c0 1 -1 2 -2 1 z" fill="#eab59e">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- wordmark -->
  <text x="262" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="112" font-weight="500" fill="#faf7f2" letter-spacing="-2">hearth</text>
  <text x="266" y="242" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="23" fill="#c6c0b6">Security-first NixOS for local LLMs and sandboxed agents</text>
  <text x="267" y="286" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14" fill="#8a8175" letter-spacing="0.5">base &#183; llm &#183; agents &#183; sandbox &#183; observability &#183; networking &#183; shell &#183; mcp</text>

  <!-- terminal mock -->
  <g transform="translate(726,70)">
    <rect width="430" height="232" rx="12" fill="#15110c" stroke="#3b352d"/>
    <rect width="430" height="34" rx="12" fill="#211c16"/>
    <rect y="22" width="430" height="12" fill="#211c16"/>
    <circle cx="22" cy="17" r="5" fill="#cc5d52"/>
    <circle cx="42" cy="17" r="5" fill="#d9a441"/>
    <circle cx="62" cy="17" r="5" fill="#7fae6b"/>
    <text x="215" y="21" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#6f6557">operator@hearth</text>

    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14.5">
      <text x="22" y="68"><tspan fill="#cc785c">$</tspan><tspan fill="#faf7f2"> hearth-runs</tspan></text>
      <text x="22" y="96" fill="#6f6557">AGENT   MODEL          TOK   COST</text>
      <text x="22" y="122" fill="#c6c0b6">demo    llama3.2:3b     142   $0.00</text>
      <text x="22" y="148" fill="#c6c0b6">build   qwen2.5-coder   2.1k  $0.00</text>
      <text x="22" y="174" fill="#c6c0b6">chat    mistral:7b      430   $0.00</text>
      <text x="22" y="206"><tspan fill="#cc785c">$</tspan><tspan fill="#faf7f2"> </tspan><tspan fill="#eab59e">&#9608;</tspan>
        <animate attributeName="opacity" values="1;0.15;1" dur="1.1s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>
</svg>
