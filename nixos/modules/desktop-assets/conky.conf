-- hearth desktop dashboard (conky). The icy "hacker" readout on the desktop:
-- CPU / RAM / GPU / network / disk with bars and graphs, top processes, clock.
conky.config = {
    own_window = true,
    -- Desktop widget: 'normal' + 'below' + sticky pins it to the desktop layer
    -- on every virtual desktop. It sits on the desktop (above the wallpaper),
    -- tucks behind your application windows, and stays out of the taskbar and
    -- task switcher. ('normal' is used instead of 'desktop' because plain
    -- 'desktop' gets hidden by Plasma's own desktop on KDE.)
    own_window_type = 'normal',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 130,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    alignment = 'top_right',
    gap_x = 36,
    gap_y = 44,
    minimum_width = 320,
    maximum_width = 320,
    border_inner_margin = 14,
    update_interval = 2,
    double_buffer = true,
    draw_shades = false,
    use_xft = true,
    font = 'monospace:size=10',
    default_color = 'A0C8FF',
    color1 = '5FD0FF',
    color2 = '6FCF7F',
    color3 = '8A93A0',
}

conky.text = [[
${color1}${font monospace:bold:size=16}hearth${font}${color3}  ${nodename}${color}
${color1}${hr 1}${color}
${color3}OS   ${color}NixOS  ${kernel}  ${machine}
${color3}Up   ${color}${uptime}
${color3}Time ${color}${time %a %d %b   %H:%M:%S}
${color3}Net  ${color}${addr wlo1}

${color1}CPU${color}  ${cpu}%   ${freq_g} GHz
${color2}${cpubar 8}${color}
${cpugraph 32,290 1c2236 5fd0ff}

${color1}RAM${color}  ${mem} / ${memmax}   ${memperc}%
${membar 8}

${color1}GPU${color}  ${execi 5 nvidia-smi --query-gpu=utilization.gpu,memory.used,memory.total --format=csv,noheader,nounits 2>/dev/null | head -1}

${color1}DISK${color} /  ${fs_used /} / ${fs_size /}   ${fs_used_perc /}%
${fs_bar 8 /}

${color1}NET${color}  ${color3}down${color} ${downspeed wlo1}   ${color3}up${color} ${upspeed wlo1}
${downspeedgraph wlo1 28,140 1c2236 5fd0ff} ${upspeedgraph wlo1 28,140 1c2236 6fcf7f}

${color1}PROCESSES${color}  ${color3}${processes} total, ${running_processes} running${color}
${color3}name              cpu%   mem%${color}
${color2}${top name 1}${color}${alignr}${top cpu 1}  ${top mem 1}
${top name 2}${alignr}${top cpu 2}  ${top mem 2}
${top name 3}${alignr}${top cpu 3}  ${top mem 3}
${top name 4}${alignr}${top cpu 4}  ${top mem 4}
${top name 5}${alignr}${top cpu 5}  ${top mem 5}
]]
