# sops-nix creation rules. This file tells sops which key encrypts which files.
#
# Replace the placeholder recipient below with your own age public key, which is
# the line printed by `age-keygen -o ~/.config/sops/age/keys.txt`. See
# docs/DECISIONS.md ADR-003 for the full walkthrough.
#
# The placeholder is not a real key. sops will refuse to encrypt until you
# replace it with yours.
keys:
  - &admin age1qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqplaceholder
creation_rules:
  - path_regex: secrets/[^/]+\.yaml$
    key_groups:
      - age:
          - *admin
